<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ทำข้อสอบ - ระบบฝึกทำข้อสอบ PLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link href="./assets/fonts.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'] }, colors: { primary: '#1a5276', secondary: '#fb923c' } } } }
  </script>
  <style>
    .q-dot { width: 30px; height: 30px; min-width: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #e2e8f0; font-weight: bold; font-size: 0.72rem; color: #64748b; cursor: pointer; transition: all 0.2s; background: white; }
    .q-dot:hover { border-color: #cbd5e1; background: #f8fafc; transform: scale(1.15); }
    .q-dot.answered { background-color: #1a5276; color: white; border-color: #1a5276; }
    .q-dot.current { background-color: #fb923c; color: white; border-color: #fb923c; box-shadow: 0 0 0 3px rgba(251,146,60,0.3); }
    .choice-label { display: flex; padding: 14px 18px; border-radius: 14px; border: 2px solid #e2e8f0; margin-bottom: 10px; cursor: pointer; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); background-color: white; align-items: flex-start; position: relative; overflow: hidden; }
    .choice-label:hover { border-color: #cbd5e1; background-color: #f8fafc; transform: translateX(4px); }
    .choice-label.selected { border-color: #fb923c; background-color: #fff7ed; transform: translateX(4px); box-shadow: 0 4px 12px rgba(251, 146, 60, 0.15); }
    .choice-label.selected::after { content: '✓'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; font-weight: bold; color: #fb923c; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes popIn { from { transform: translateY(-50%) scale(0); } to { transform: translateY(-50%) scale(1); } }
    .timer-warning { color: #ea580c; animation: pulse 2s infinite; }
    .timer-danger { color: #dc2626; animation: pulse 1s infinite; }
    .dots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); gap: 6px; max-height: 160px; overflow-y: auto; padding: 4px 0; }
    @media (min-width: 768px) { .dots-grid { grid-template-columns: repeat(auto-fill, minmax(32px, 1fr)); max-height: 120px; } }
    .streak-badge { position: fixed; top: 80px; right: 16px; z-index: 45; background: linear-gradient(135deg,#fb923c,#f97316); color: white; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; box-shadow: 0 4px 12px rgba(251,146,60,0.3); transition: all 0.3s; opacity: 0; transform: translateX(60px); pointer-events: none; }
    .streak-badge.show { opacity: 1; transform: translateX(0); }
    .milestone-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); z-index: 100; background: white; border-radius: 20px; padding: 24px 32px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.15); transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; }
    .milestone-toast.show { transform: translate(-50%,-50%) scale(1); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen relative pb-40">
  <!-- Streak Badge -->
  <div class="streak-badge" id="streakBadge">🔥 <span id="streakCount">0</span> ข้อติด!</div>
  <!-- Milestone Toast -->
  <div class="milestone-toast" id="milestoneToast">
    <div class="text-4xl mb-2" id="milestoneIcon">🎉</div>
    <div class="font-bold text-lg text-slate-800" id="milestoneText">ทำได้ 25% แล้ว!</div>
  </div>

  <!-- Sticky Header -->
  <header class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-md shadow-sm z-50 border-b border-slate-200 transition-all">
    <div class="container mx-auto px-4 h-16 flex justify-between items-center">
      <div class="flex-1 truncate pr-4">
        <h1 class="text-lg md:text-xl font-bold text-primary truncate" id="examTitle">กำลังโหลดชุดข้อสอบ...</h1>
      </div>
      <div class="flex-none flex items-center gap-3">
        <div class="hidden sm:flex items-center gap-2 text-sm font-bold text-slate-500" id="answeredCount">
          <i class="fa-solid fa-check-double text-green-500"></i> <span id="answeredLabel">0/0</span>
        </div>
        <div class="bg-slate-100 px-4 py-2 rounded-xl flex items-center gap-2 font-mono font-bold text-lg md:text-xl text-slate-700 shadow-inner" id="timerDisplayContainer">
          <i class="fa-regular fa-clock text-primary"></i> <span id="timerDisplay">--:--</span>
        </div>
      </div>
    </div>
    <div class="h-1.5 w-full bg-slate-200">
      <div class="h-full bg-gradient-to-r from-secondary to-orange-500 transition-all duration-300" id="progressFill" style="width: 0%;"></div>
    </div>
  </header>

  <div class="container mx-auto px-4 pt-24 max-w-4xl">
    <div id="examBody" class="space-y-8 pb-10"></div>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-4px_20px_rgba(0,0,0,0.08)] z-40 transition-all duration-300" id="examNav">
    <div class="absolute -top-10 right-4">
      <button class="bg-white text-slate-500 w-10 h-10 rounded-t-xl shadow-[0_-4px_10px_rgba(0,0,0,0.05)] flex items-center justify-center border border-b-0 border-slate-200" onclick="toggleNav()" id="navToggleBtn">
        <i class="fa-solid fa-chevron-down"></i>
      </button>
    </div>
    <div class="container mx-auto p-3 md:p-4">
      <!-- Summary bar -->
      <div class="flex items-center justify-between mb-2 text-sm font-medium text-slate-500 px-1">
        <span><i class="fa-solid fa-list-check text-primary mr-1"></i> ตอบแล้ว <strong class="text-primary" id="navAnswered">0</strong> / <strong id="navTotal">0</strong> ข้อ</span>
        <span class="text-xs text-slate-400">กดเลขข้อเพื่อเลื่อนไป</span>
      </div>
      <!-- Grid dots -->
      <div class="dots-grid" id="questionDots"></div>
      <!-- Action buttons -->
      <div class="flex gap-2 mt-3">
        <button class="btn btn-error btn-outline flex-1 rounded-xl btn-sm md:btn-md" onclick="openCancelModal()">
          <i class="fa-solid fa-xmark mr-1"></i> ยกเลิก
        </button>
        <button class="btn btn-primary flex-1 rounded-xl btn-sm md:btn-md bg-gradient-to-r from-primary to-blue-800 border-none shadow-lg shadow-primary/30" onclick="openModal()">
          <i class="fa-solid fa-paper-plane mr-1"></i> ส่งข้อสอบ
        </button>
      </div>
    </div>
  </div>

  <!-- Report Modal -->
  <dialog id="reportModal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box bg-white rounded-3xl">
      <h3 class="font-bold text-lg text-red-600 border-b pb-2 mb-4"><i class="fa-solid fa-triangle-exclamation"></i> แจ้งปัญหาข้อสอบ</h3>
      <input type="hidden" id="reportQIndex">
      <div class="mb-4">
        <div class="text-sm text-slate-500 mb-1">ข้อที่กำลังแจ้งปัญหา:</div>
        <div class="p-3 bg-slate-50 rounded-lg text-sm text-slate-700 font-medium" id="reportQLabel">...</div>
      </div>
      <div class="form-control w-full mb-3">
        <label class="label"><span class="label-text font-bold text-slate-700">ประเภทปัญหา</span></label>
        <select class="select select-bordered w-full rounded-xl" id="reportType">
          <option value="wrong_answer">เฉลยผิด / ตัวเลือกผิด</option>
          <option value="typo">พิมพ์ผิด / อ่านไม่รู้เรื่อง</option>
          <option value="missing_image">รูปภาพไม่ขึ้น / ไม่ชัด</option>
          <option value="no_correct">ไม่มีคำตอบที่ถูกเลย</option>
          <option value="other">อื่นๆ</option>
        </select>
      </div>
      <div class="form-control w-full mb-4">
        <label class="label"><span class="label-text font-bold text-slate-700">รายละเอียดเพิ่มเติม (ถ้ามี)</span></label>
        <textarea class="textarea textarea-bordered h-24 rounded-xl" id="reportNote" placeholder="อธิบายเพิ่มเติม..."></textarea>
      </div>
      <div id="reportStatus" class="text-sm font-bold text-center mb-4 hidden"></div>
      <div class="modal-action">
        <button class="btn btn-ghost rounded-xl" onclick="closeReportModal()">ยกเลิก</button>
        <button class="btn btn-error text-white rounded-xl" id="reportSubmitBtn" onclick="submitReport()"><i class="fa-solid fa-paper-plane"></i> ส่งรายงาน</button>
      </div>
    </div>
  </dialog>

  <script src="./assets/questions_set1.js"></script>
  <script src="./assets/questions_set2.js"></script>
  <script src="./assets/questions_set3.js"></script>
  <script src="./assets/questions_set4.js"></script>
  <script src="./assets/questions_set5.js"></script>
  <script src="./assets/elec_set1.js"></script>
  <script src="./assets/elec_set2.js"></script>
  <script src="./assets/elec_set3.js"></script>
  <script src="./assets/elec_set4.js"></script>
  <script src="./assets/elec_set5.js"></script>
  <script src="./assets/app.js"></script>
  <script>
    const user = requireAuth();
    const setIdRaw = sessionStorage.getItem('plc_current_set') || '1';
    const examSet = getAllExamSets().find(s => s.id == setIdRaw);
    if (!examSet) { window.location.href = 'dashboard.html'; }
    const isCustomSet = !ALL_EXAM_SETS.find(s => s.id == setIdRaw) && !ALL_ELEC_SETS.find(s => s.id == setIdRaw);
    const _ss = getSetSettings(setIdRaw);
    const examPassScore = _ss ? _ss.passScore : (examSet.passScore || PASS_SCORE);
    const examTimeMinutes = _ss ? _ss.timeMinutes : (examSet.timeMinutes || EXAM_TIME_MINUTES);

    function shuffleChoices(qs) {
      return qs.map(q => {
        const correctText = q.choices[q.answer];
        const shuffled = shuffleArray([...q.choices]);
        return { ...q, choices: shuffled, answer: shuffled.indexOf(correctText) };
      });
    }

    const questions = shuffleChoices(shuffleArray(examSet.questions));
    const userAnswers = new Array(questions.length).fill(null);
    let timeLeft = examTimeMinutes * 60;
    let timerInterval;
    let examSubmitted = false;
    const letters = ['ก', 'ข', 'ค', 'ง'];

    function renderQuestions() {
      const body = document.getElementById('examBody');
      body.innerHTML = questions.map((q, i) => `
        <div class="glass-card bg-white/90 p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200" id="qblock${i}" data-aos="fade-up">
          <div class="flex justify-between items-start gap-4 mb-4 border-b border-slate-100 pb-4">
            <div class="font-bold text-primary flex items-center gap-2">
              <span class="bg-blue-100 text-primary w-8 h-8 rounded-full flex items-center justify-center">${i + 1}</span>
              จาก ${questions.length}
            </div>
            <button class="btn btn-ghost btn-xs text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg" onclick="openReportModal(${i})">
              <i class="fa-solid fa-triangle-exclamation mr-1"></i> แจ้งปัญหา
            </button>
          </div>
          <div class="text-lg font-medium text-slate-800 mb-6 leading-relaxed">${q.text}</div>
          ${q.image ? `<img src="${q.image}" class="max-w-full max-h-64 object-contain rounded-xl border border-slate-200 mb-6 mx-auto">` : ''}
          <div class="space-y-3">
            ${q.choices.map((c, ci) => `
              <label class="choice-label group" id="label${i}_${ci}">
                <input type="radio" name="q${i}" value="${ci}" onchange="selectAnswer(${i}, ${ci})" class="radio radio-primary radio-sm mt-1 mr-4 opacity-70 group-hover:opacity-100 transition-opacity">
                <div class="flex-1">
                  <span class="font-bold text-slate-400 mr-2">${letters[ci]}.</span>
                  <span class="text-slate-700">${c.replace(/^[กขคง]\.\s*/, '')}</span>
                  ${q.choiceImages && q.choiceImages[ci] ? `<img src="${q.choiceImages[ci]}" class="max-w-xs max-h-32 object-contain rounded-lg border border-slate-200 mt-3 block">` : ''}
                </div>
              </label>
            `).join('')}
          </div>
        </div>
      `).join('');
      AOS.init({ once: true, offset: 50 });
    }

    function selectAnswer(qIndex, choiceIndex) {
      userAnswers[qIndex] = choiceIndex;
      for (let ci = 0; ci < 4; ci++) {
        const lbl = document.getElementById(`label${qIndex}_${ci}`);
        if (lbl) lbl.classList.toggle('selected', ci === choiceIndex);
      }
      updateDots(); updateProgress(); updateAnsweredLabel();
      // Streak
      let streak = 0;
      for (let k = qIndex; k >= 0; k--) { if (userAnswers[k] !== null) streak++; else break; }
      if (streak >= 3) { document.getElementById('streakCount').textContent = streak; document.getElementById('streakBadge').classList.add('show'); clearTimeout(window._streakTimer); window._streakTimer = setTimeout(() => document.getElementById('streakBadge').classList.remove('show'), 2500); }
      // Milestones
      const answered = userAnswers.filter(a => a !== null).length;
      const pctDone = Math.round((answered / questions.length) * 100);
      const milestones = [25, 50, 75, 100];
      const icons = ['🚀', '🔥', '💪', '🎉'];
      const texts = ['ทำได้ 25% แล้ว!', 'ครึ่งทางแล้ว!', 'เกือบเสร็จ 75%!', 'ตอบครบทุกข้อ! 🎊'];
      milestones.forEach((m, mi) => {
        if (pctDone >= m && !window['_milestone_' + m]) {
          window['_milestone_' + m] = true;
          document.getElementById('milestoneIcon').textContent = icons[mi];
          document.getElementById('milestoneText').textContent = texts[mi];
          document.getElementById('milestoneToast').classList.add('show');
          setTimeout(() => document.getElementById('milestoneToast').classList.remove('show'), 1800);
        }
      });
      // Auto-scroll to next unanswered
      if (qIndex < questions.length - 1) {
        setTimeout(() => {
          let next = qIndex + 1;
          while (next < questions.length && userAnswers[next] !== null) next++;
          if (next >= questions.length) next = qIndex + 1;
          scrollToQuestion(next);
        }, 450);
      }
    }

    function renderDots() {
      document.getElementById('questionDots').innerHTML = questions.map((_, i) => `<div class="q-dot" id="dot${i}" onclick="scrollToQuestion(${i})">${i + 1}</div>`).join('');
      document.getElementById('navTotal').textContent = questions.length;
    }
    function updateDots() {
      const answered = userAnswers.filter(a => a !== null).length;
      questions.forEach((_, i) => {
        const dot = document.getElementById(`dot${i}`);
        if (dot) {
          dot.classList.toggle('answered', userAnswers[i] !== null);
        }
      });
      document.getElementById('navAnswered').textContent = answered;
    }
    function updateAnsweredLabel() {
      const el = document.getElementById('answeredLabel');
      if (el) el.textContent = `${userAnswers.filter(a => a !== null).length}/${questions.length}`;
    }
    function updateProgress() { const pct = (userAnswers.filter(a => a !== null).length / questions.length) * 100; document.getElementById('progressFill').style.width = pct + '%'; }
    function scrollToQuestion(i) { const el = document.getElementById(`qblock${i}`); if (el) { window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 80, behavior: 'smooth' }); } }
    // Track current question in viewport
    let _currentQ = 0;
    function setupObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const idx = parseInt(e.target.id.replace('qblock', ''));
            _currentQ = idx;
            document.querySelectorAll('.q-dot').forEach(d => d.classList.remove('current'));
            const dot = document.getElementById('dot' + idx);
            if (dot && userAnswers[idx] === null) dot.classList.add('current');
          }
        });
      }, { threshold: 0.3, rootMargin: '-80px 0px -40% 0px' });
      questions.forEach((_, i) => { const el = document.getElementById('qblock' + i); if (el) observer.observe(el); });
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const display = document.getElementById('timerDisplay');
        const container = document.getElementById('timerDisplayContainer');
        display.textContent = formatTime(timeLeft);
        if (timeLeft <= 300 && timeLeft > 60) container.classList.add('timer-warning');
        else if (timeLeft <= 60 && timeLeft > 0) { container.classList.remove('timer-warning'); container.classList.add('timer-danger'); }
        if (timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
      }, 1000);
    }

    function toggleNav() {
      const nav = document.getElementById('examNav');
      const icon = document.getElementById('navToggleBtn').querySelector('i');
      if (nav.classList.contains('translate-y-full')) { nav.classList.remove('translate-y-full'); icon.className = 'fa-solid fa-chevron-down'; }
      else { nav.classList.add('translate-y-full'); icon.className = 'fa-solid fa-chevron-up'; }
    }

    function openCancelModal() {
      Swal.fire({ title:'ยกเลิกการสอบ?', text:"ความคืบหน้าทั้งหมดจะสูญหาย", icon:'warning', showCancelButton:true, confirmButtonColor:'#e74c3c', cancelButtonColor:'#95a5a6', confirmButtonText:'ใช่, ยกเลิก', cancelButtonText:'ทำต่อ' }).then(r => { if(r.isConfirmed) { clearInterval(timerInterval); window.location.href='dashboard.html'; } });
    }

    function openModal() {
      const answered = userAnswers.filter(a => a !== null).length;
      const total = questions.length;
      let html = `<p class="mb-4 text-slate-600">คุณทำข้อสอบไปแล้ว <strong>${answered}</strong> จาก <strong>${total}</strong> ข้อ</p>`;
      if (answered < total) html += `<div class="p-4 bg-red-50 text-red-600 rounded-xl text-sm mb-4 border border-red-100 flex items-center gap-3"><i class="fa-solid fa-triangle-exclamation text-2xl"></i> <div class="text-left">ยังมีข้อที่ไม่ได้ตอบ <strong>${total-answered}</strong> ข้อ<br>หากกดส่ง จะถือว่าผิดทั้งหมด</div></div>`;
      Swal.fire({ title:'ยืนยันการส่งข้อสอบ?', html, icon: answered===total?'question':'warning', showCancelButton:true, confirmButtonColor:'#1a5276', cancelButtonColor:'#95a5a6', confirmButtonText:'ส่งข้อสอบ', cancelButtonText:'กลับไปตรวจสอบ' }).then(r => { if(r.isConfirmed) submitExam(); });
    }

    async function submitExam() {
      if (examSubmitted) return;
      examSubmitted = true;
      clearInterval(timerInterval);
      showLoading('กำลังบันทึกผลการสอบ...', 'กรุณารอสักครู่ ระบบกำลังประมวลผล');

      let score = 0;
      const details = questions.map((q, i) => {
        const correct = q.answer;
        const userAns = userAnswers[i];
        const isCorrect = userAns === correct;
        if (isCorrect) score++;
        return { text: q.text, choices: q.choices, correct, userAns, isCorrect };
      });

      const timeTaken = (examTimeMinutes * 60) - timeLeft;
      const passed = score >= examPassScore;
      const result = { setId: examSet.id, setTitle: examSet.title || `ชุดที่ ${examSet.id}`, score, total: questions.length, passed, passScore: examPassScore, timeTaken, date: new Date().toISOString(), details };

      saveResult(user.id, result);
      sessionStorage.setItem('plc_last_result', JSON.stringify(result));
      const _all = JSON.parse(localStorage.getItem('plc_history') || '{}');
      await Promise.race([fbWrite('plc_history/' + user.id, _all[user.id]), new Promise(r => setTimeout(r, 3000))]).catch(() => {});
      window.location.href = 'result.html';
    }

    // Init
    document.getElementById('examTitle').textContent = examSet.title || (isCustomSet ? examSet.title : `ชุดที่ ${examSet.id} | ครบทุกหัวข้อ ${questions.length} ข้อ`);
    renderQuestions(); renderDots(); updateDots(); updateAnsweredLabel(); startTimer();
    setTimeout(() => setupObserver(), 500);

    // Report
    function openReportModal(qIndex) {
      document.getElementById('reportQIndex').value = qIndex;
      document.getElementById('reportQLabel').textContent = `ข้อที่ ${qIndex+1}: ${questions[qIndex].text.slice(0,60)}${questions[qIndex].text.length>60?'…':''}`;
      document.getElementById('reportType').value = 'wrong_answer';
      document.getElementById('reportNote').value = '';
      document.getElementById('reportStatus').classList.add('hidden');
      const btn = document.getElementById('reportSubmitBtn'); btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> ส่งรายงาน';
      document.getElementById('reportModal').showModal();
    }
    function closeReportModal() { document.getElementById('reportModal').close(); }
    async function submitReport() {
      const qIndex = parseInt(document.getElementById('reportQIndex').value);
      const type = document.getElementById('reportType').value;
      const note = document.getElementById('reportNote').value.trim().replace(/[<>"']/g, '');
      const q = questions[qIndex];
      const btn = document.getElementById('reportSubmitBtn');
      btn.disabled = true; btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span> กำลังส่ง...';
      const report = { id: 'r_'+Date.now(), date: new Date().toISOString(), reporterId: user.id, reporterName: user.name, reporterStudentId: user.studentId, setId: examSet.id, setTitle: examSet.title||`ชุดที่ ${examSet.id}`, questionIndex: qIndex, questionText: q.text, choices: q.choices, correctAnswer: q.answer, type, note, status: 'pending' };
      const reports = JSON.parse(localStorage.getItem('plc_reports')||'[]');
      reports.unshift(report);
      localStorage.setItem('plc_reports', JSON.stringify(reports));
      fbWrite('plc_reports/' + report.id, report);
      const statusEl = document.getElementById('reportStatus');
      statusEl.classList.remove('hidden');
      statusEl.className = 'text-sm font-bold text-center mb-4 text-green-600';
      statusEl.innerHTML = '<i class="fa-solid fa-circle-check"></i> ส่งรายงานเรียบร้อย ขอบคุณ!';
